<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaVantage Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="./lib/mapLibre/dist/maplibre-gl.css" />
    <script src="./lib/mapLibre/dist/maplibre-gl.js"></script>

    <script src="./lib/chart@4.2.0.umd.min.js"></script>

    <script src="./lib/axios@1.13.min.js"></script>

    <script src="./lib/myAxios.js"></script>
    <script src="./lib/myChart.js"></script>
    <script src="./lib/myMapLibre.js"></script>
    <script src="./lib/environment.js"></script>

    <link rel="stylesheet" href="./index.css">
    <script defer src="./index.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger border-3">
        <div class="container-fluid">
            <a class="navbar-brand text-danger fw-bold" href="#">
                <i class="bi bi-graph-up-arrow"></i> AlphaVantage
            </a>
        </div>
    </nav>

    <div class="container my-4" id="wrapper">

        <div class="row mb-4">
            <div class="col-md-6 mb-3 mb-md-0">
                <div class="card bg-dark border-danger shadow">
                    <div class="card-header bg-black text-white border-danger">
                        <h5 class="mb-0"><i class="bi bi-search text-danger"></i> Ricerca Incrementale</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" id="searchInput"
                                class="form-control bg-black text-white border-secondary"
                                placeholder="Cerca azienda per nome (es. IBM)...">
                        </div>
                        <ul id="searchResults" class="list-group mt-2 d-none">
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card bg-dark border-danger shadow h-100">
                    <div class="card-header bg-black text-white border-danger">
                        <h5 class="mb-0"><i class="bi bi-building text-danger"></i> Selezione Azienda</h5>
                    </div>
                    <div class="card-body d-flex flex-column justify-content-center">
                        <select id="companySelect" class="form-select bg-black text-white border-secondary mb-3">
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <div id="bodyContainer" style="display: none;">

            <div class="row mb-4">
                <div class="col-12">
                    <div class="card bg-dark border-danger shadow">
                        <div
                            class="card-header bg-black text-white border-danger d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="bi bi-table text-danger"></i> Global Quote (Valori Odierni)</h5>
                            <button id="btnUpdateData" class="btn btn-sm btn-danger"><i
                                    class="bi bi-arrow-clockwise"></i> Aggiorna Dati</button>
                        </div>
                        <div class="card-body overflow-auto">
                            <table
                                class="table table-dark table-striped table-hover table-bordered border-secondary mb-0 text-center align-middle">
                                <thead class="table-danger border-danger">
                                    <tr class="header">
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td id="tdSymbol">-</td>
                                        <td id="tdOpen">-</td>
                                        <td id="tdHigh">-</td>
                                        <td id="tdLow">-</td>
                                        <td id="tdPrice" class="fw-bold">-</td>
                                        <td id="tdVolume">-</td>
                                        <td id="tdPreviousClose">-</td>
                                        <td id="tdChange">-</td>
                                        <td id="tdChangePercent">-</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-lg-5 mb-3 mb-lg-0">
                    <div class="card bg-dark border-danger shadow h-100">
                        <div class="card-header bg-black text-white border-danger">
                            <h5 class="mb-0"><i class="bi bi-info-circle text-danger"></i> Company Overview</h5>
                        </div>
                        <div class="card-body" id="cardOv">
                            <h4 id="ovName" class="text-danger fw-bold">-</h4>
                            <hr class="border-secondary">
                            <p><strong><i class="bi bi-geo-alt text-danger"></i> Sede:</strong> <span
                                    id="ovAddress">-</span></p>
                            <p><a href="" id="ovLink" class="text-danger text-decoration-none"><strong><i
                                            class="bi bi-globe text-danger"></i> Clicca qui per raggiungere il sito
                                        ufficiale</strong></a></p>
                            <p><strong><i class="bi bi-info-circle text-danger"></i> </strong><span
                                    id="ovDescription">-</span></p>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7">
                    <div class="card bg-dark border-danger shadow h-100">
                        <div class="card-header bg-black text-white border-danger">
                            <h5 class="mb-0"><i class="bi bi-map text-danger"></i> Mappa Sede Aziendale</h5>
                        </div>
                        <div class="card-body p-0">
                            <div id="mapContainer" style="height: 350px; width: 100%;" class="bg-black"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mb-5">
                <div class="col-12">
                    <div class="card bg-dark border-danger shadow">
                        <div
                            class="card-header bg-black text-white border-danger d-flex flex-column flex-md-row justify-content-between align-items-md-center">
                            <h5 class="mb-3 mb-md-0"><i class="bi bi-bar-chart-fill text-danger"></i> Andamento Storico
                            </h5>
                            <div class="d-flex gap-2 flex-wrap">
                                <select id="chartPeriod"
                                    class="form-select form-select-sm bg-black text-white border-secondary"
                                    style="width: auto;">
                                    <option value="6M">6 Mesi</option>
                                    <option value="1A">1 Anno</option>
                                    <option value="2A">2 Anni</option>
                                </select>
                                <select id="chartType"
                                    class="form-select form-select-sm bg-black text-white border-secondary"
                                    style="width: auto;">
                                    <option value="bar">Bar Chart</option>
                                    <option value="line">Line Chart</option>
                                </select>
                                <button id="btnSaveChart" class="btn btn-sm btn-outline-info"><i
                                        class="bi bi-download"></i> Salva</button>
                            </div>
                        </div>
                        <div class="card-body bg-white text-black p-4">
                            <div class="chart-container" style="position: relative; height:40vh; width:100%">
                                <canvas id="myChartCanvas"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="selectionMessage" class="d-flex justify-content-center align-items-start pt-5">
            <h1 class="text-danger text-center px-3">Prima di vedere i dati devi selezionare un'azienda!</h1>
        </div>
    </div>
</body>

</html>
